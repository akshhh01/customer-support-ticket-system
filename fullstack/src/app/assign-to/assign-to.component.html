<div class="customer-container">
  <h1>Customer Support Representatives</h1>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody *ngIf="csrs.length > 0">
      <ng-container *ngFor="let item of csrs">
        <tr *ngIf="item.id !== null">
          <td>{{ item.id }}</td>
          <td>{{ item.name }}</td>
          <td>{{ item.email }}</td>
          <td>{{ item.mobile }}</td>
          <td>
            <span class="role-badge" [ngClass]="{
              'role-admin': item.role === 'ADMIN',
              'role-csr': item.role === 'CSR'
            }">
              {{ item.role }}
            </span>
          </td>
          <td>
            <button (click)="assignToCsr(item.id)" class="view-button">
              Assign
            </button>
          </td>
        </tr>
      </ng-container>
    </tbody>
  </table>

  <div *ngIf="csrs.length === 0" class="no-data">
    No customer representatives found.
  </div>
</div>
