
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

<div class="container">
  <div class="container-1">
     <div class="container-2">
  <form (ngSubmit)="userLogIn()" >
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="logInData.email" class="form-control" name="email" placeholder="Email">
     <div *ngIf="email" [ngClass]="isEmail ? 'alert alert-danger' : 'alert alert-success'">
    {{ email }}
  </div>
    </div>
  <div class="form-group">
    <label>password</label>
    <input type="password" [(ngModel)]="logInData.password" [ngModelOptions]="{standalone:true}" class="form-control" name="Password" placeholder="password">
  <div *ngIf="password" [ngClass]="isPassword ? 'alert alert-danger' : 'alert alert-success'">
    {{ password }}
  </div>
  </div>
  <button type="submit" class="btn btn-primary">log-in <span class="badge badge-light"></span></button>

    <p>Create an new account? <a routerLink="/sing-up">Sign up</a></p>
      <div *ngIf="message" [ngClass]="isError ? 'alert alert-danger' : 'alert alert-success'">  {{ message }}
      </div>
</form>
</div>
      </div>

</div>
