<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
 <body>
<div class="container">
  <div class="container-1">
    <div class="container-2">
      <h3 class="text-center">User Registration</h3>

      <form (ngSubmit)="onSubmit()" #form="ngForm">
        <div class="form-group mb-3">
          <label>Enter Name</label>
          <input type="text" [(ngModel)]="user.name" name="name" class="form-control" required />
        </div>

        <div class="form-group mb-3">
          <label>Enter Email</label>
          <input type="email" [(ngModel)]="user.email" name="email" class="form-control" required />
       <div *ngIf="email" [ngClass]="isEmail ? 'alert alert-danger' : 'alert alert-success'">
    {{ email }}
  </div>
        </div>

        <div class="form-group mb-3">
          <label>Enter Password</label>
          <input type="password" [(ngModel)]="user.password" name="password" class="form-control" required />
      <div *ngIf="password" [ngClass]="isPassword ? 'alert alert-danger' : 'alert alert-success'">
    {{ password }}
  </div>
        </div>

        <div class="form-group mb-3">
          <label>Enter Mobile</label>
          <input type="text" [(ngModel)]="user.mobile" [ngModelOptions]="{standalone: true}" name="mobile" class="form-control" required />
          <div *ngIf="mobile" [ngClass]="isMobile ? 'alert alert-danger' : 'alert alert-success'">
    {{ mobile }}
  </div>
        </div>
<div>
 <select id="role" name="role" [(ngModel)]="user.role">
  <option  value="CUSTOMER" >customer</option>
  <option value="CSR" >csr</option>
</select>
</div>

        <button type="submit" class="btn btn-success" [disabled]="form.invalid">Register</button>
      </form>
<div *ngIf="message" [ngClass]="isError ? 'alert alert-danger' : 'alert alert-success'">
    {{ message }}
  </div>
 <p>already have an account? <a routerLink="/log-in" >log-in</a></p>



    </div>
  </div>
</div>
</body>
